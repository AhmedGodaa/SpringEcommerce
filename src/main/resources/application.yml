server:
  error:
    include-message: always
    include-binding-errors: always

spring:

  datasource:
    url: jdbc:mysql://localhost:3306/signindb
    username: root

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        formate_sql: true
    show-sql: true
SpringEcommerce:
  app:
    jwtCookieName: SpringEcommerce
    jwtSecret: SpringEcommerceSecretKey
    jwtExpirationMs: 86400000

